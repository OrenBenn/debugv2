<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Debug Preview</title>
<style>
body { font-family: monospace; background:#111; color:#eee; padding:20px; }
input { background:#222; border:1px solid #444; color:#eee; padding:8px; width:280px; border-radius:6px; }
button { background:#1db954; color:#000; border:none; padding:8px 16px; border-radius:6px; cursor:pointer; margin-left:8px; }
.result { margin:10px 0; padding:10px; border-radius:6px; background:#1a1a1a; }
.ok { border-left:3px solid #1db954; }
.fail { border-left:3px solid #ff4444; }
.pending { border-left:3px solid #888; }
audio { display:block; margin-top:8px; width:100%; }
</style>
</head>
<body>
<h2>🔍 Debug Preview Sources</h2>
<div>
  <input id="artist" placeholder="Artiste" value="Shae" />
  <input id="track" placeholder="Titre" value="בוהדנה" style="margin-left:8px;" />
  <button onclick="testAll()">Tester</button>
</div>
<div id="results" style="margin-top:20px;"></div>

<script>
async function testAll() {
  const artist = document.getElementById('artist').value.trim();
  const track  = document.getElementById('track').value.trim();
  const res    = document.getElementById('results');
  res.innerHTML = '';

  const countries = ['us', 'il', 'fr', 'gb'];
  for (const c of countries) {
    log('pending', `iTunes (${c.toUpperCase()})`, 'Recherche...');
  }

  for (const country of countries) {
    try {
      const q = encodeURIComponent(artist + ' ' + track);
      const r = await fetch(`https://itunes.apple.com/search?term=${q}&entity=song&limit=10&country=${country}`);
      const d = await r.json();
      console.log(`iTunes ${country}:`, d);
      const match = d.results?.find(t => t.trackName?.toLowerCase() === track.toLowerCase() && t.previewUrl)
                 || d.results?.find(t => t.previewUrl);
      if (match?.previewUrl) {
        update(`iTunes (${country.toUpperCase()})`, 'ok', `✅ ${match.trackName} - ${match.artistName}<br><audio controls src="${match.previewUrl}"></audio>`);
      } else {
        update(`iTunes (${country.toUpperCase()})`, 'fail', `❌ ${d.resultCount} résultats, aucun preview. <button onclick="showRaw('${country}', '${encodeURIComponent(JSON.stringify(d.results?.slice(0,3)))}')">Voir données</button>`);
      }
    } catch(e) {
      update(`iTunes (${country.toUpperCase()})`, 'fail', `❌ Erreur: ${e.message}`);
    }
  }
}

function showRaw(country, data) {
  console.log(`Raw iTunes ${country}:`, JSON.parse(decodeURIComponent(data)));
  alert('Voir la console (F12) pour les données brutes');
}

function log(type, label, msg) {
  const d = document.getElementById('results');
  const div = document.createElement('div');
  div.className = `result ${type}`;
  div.id = `log-${label}`;
  div.innerHTML = `<strong>${label}</strong><br>${msg}`;
  d.appendChild(div);
}

function update(label, type, msg) {
  const el = document.getElementById(`log-${label}`);
  if (el) { el.className = `result ${type}`; el.innerHTML = `<strong>${label}</strong><br>${msg}`; }
}
</script>
</body>
</html>
