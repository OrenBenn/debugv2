<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Debug Preview - ISRC</title>
<style>
body { font-family: monospace; background:#111; color:#eee; padding:20px; }
input { background:#222; border:1px solid #444; color:#eee; padding:8px; width:260px; border-radius:6px; }
button { background:#1db954; color:#000; border:none; padding:8px 16px; border-radius:6px; cursor:pointer; margin-left:8px; }
.result { margin:10px 0; padding:10px; border-radius:6px; background:#1a1a1a; }
.ok { border-left:3px solid #1db954; }
.fail { border-left:3px solid #ff4444; }
.pending { border-left:3px solid #888; }
audio { display:block; margin-top:8px; width:100%; }
</style>
</head>
<body>
<h2>🔍 Debug Preview - ISRC</h2>
<p style="color:#aaa;font-size:13px;">Entrez un Spotify Track ID (ex: depuis l'URL open.spotify.com/track/<strong>ID</strong>)</p>
<div>
  <input id="trackid" placeholder="Spotify Track ID" value="" />
  <button onclick="testISRC()">Tester</button>
</div>
<div id="results" style="margin-top:20px;"></div>

<script>
const CLIENT_ID     = '3f3173e083604096abe93d93e05a8867';
const CLIENT_SECRET = '76dff06debf5467aa7fe2dc911779134';
let token = '';

async function getToken() {
  if (token) return token;
  const r = await fetch('https://accounts.spotify.com/api/token', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/x-www-form-urlencoded',
      'Authorization': 'Basic ' + btoa(CLIENT_ID + ':' + CLIENT_SECRET)
    },
    body: 'grant_type=client_credentials'
  });
  const d = await r.json();
  token = d.access_token;
  return token;
}

async function testISRC() {
  const trackId = document.getElementById('trackid').value.trim();
  if (!trackId) return alert('Entrez un Spotify Track ID');
  const res = document.getElementById('results');
  res.innerHTML = '';

  log('pending', 'Spotify', 'Récupération du track...');

  try {
    const tok = await getToken();
    const r = await fetch(`https://api.spotify.com/v1/tracks/${trackId}`, {
      headers: { Authorization: 'Bearer ' + tok }
    });
    const track = await r.json();
    const isrc = track.external_ids?.isrc;
    const name = track.name;
    const artist = track.artists?.[0]?.name;
    const spotifyPreview = track.preview_url;

    update('Spotify', 'ok', `✅ ${name} - ${artist}<br>ISRC: <strong>${isrc || 'N/A'}</strong><br>Preview Spotify: ${spotifyPreview ? `<audio controls src="${spotifyPreview}"></audio>` : '❌ Aucun'}`);

    if (isrc) {
      // Test iTunes par ISRC dans plusieurs pays
      for (const country of ['us', 'il', 'fr', 'gb']) {
        log('pending', `iTunes ISRC (${country.toUpperCase()})`, 'Recherche...');
        try {
          const r2 = await fetch(`https://itunes.apple.com/search?term=${encodeURIComponent(isrc)}&entity=song&limit=5&country=${country}`);
          const d2 = await r2.json();
          const match = d2.results?.find(t => t.previewUrl);
          if (match?.previewUrl) {
            update(`iTunes ISRC (${country.toUpperCase()})`, 'ok', `✅ ${match.trackName} - ${match.artistName}<br><audio controls src="${match.previewUrl}"></audio>`);
          } else {
            // Essai sans country
            const r3 = await fetch(`https://itunes.apple.com/lookup?isrc=${isrc}&country=${country}`);
            const d3 = await r3.json();
            const m3 = d3.results?.find(t => t.previewUrl);
            if (m3?.previewUrl) {
              update(`iTunes ISRC (${country.toUpperCase()})`, 'ok', `✅ via lookup: ${m3.trackName}<br><audio controls src="${m3.previewUrl}"></audio>`);
            } else {
              update(`iTunes ISRC (${country.toUpperCase()})`, 'fail', `❌ ${d2.resultCount} résultats search, ${d3.resultCount} lookup`);
            }
          }
        } catch(e) {
          update(`iTunes ISRC (${country.toUpperCase()})`, 'fail', `❌ ${e.message}`);
        }
      }
    }

    // Test par nom comme fallback
    log('pending', 'iTunes par nom (IL)', 'Recherche...');
    try {
      const q = encodeURIComponent(artist + ' ' + name);
      const r4 = await fetch(`https://itunes.apple.com/search?term=${q}&entity=song&limit=10&country=il`);
      const d4 = await r4.json();
      const match = d4.results?.find(t => t.trackName?.toLowerCase() === name.toLowerCase() && t.previewUrl)
                 || d4.results?.find(t => t.previewUrl);
      if (match?.previewUrl) {
        update('iTunes par nom (IL)', 'ok', `✅ ${match.trackName} - ${match.artistName}<br><audio controls src="${match.previewUrl}"></audio>`);
      } else {
        update('iTunes par nom (IL)', 'fail', `❌ ${d4.resultCount} résultats, aucun preview`);
      }
    } catch(e) {
      update('iTunes par nom (IL)', 'fail', `❌ ${e.message}`);
    }

  } catch(e) {
    update('Spotify', 'fail', `❌ Erreur: ${e.message}`);
  }
}

function log(type, label, msg) {
  const d = document.getElementById('results');
  const div = document.createElement('div');
  div.className = `result ${type}`;
  div.id = `log-${label}`;
  div.innerHTML = `<strong>${label}</strong><br>${msg}`;
  d.appendChild(div);
}
function update(label, type, msg) {
  const el = document.getElementById(`log-${label}`);
  if (el) { el.className = `result ${type}`; el.innerHTML = `<strong>${label}</strong><br>${msg}`; }
}
</script>
</body>
</html>
