<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Debug Album Previews</title>
<style>
body { font-family: monospace; background:#111; color:#eee; padding:20px; }
input { background:#222; border:1px solid #444; color:#eee; padding:8px; width:220px; border-radius:6px; }
button { background:#1db954; color:#000; border:none; padding:8px 16px; border-radius:6px; cursor:pointer; margin:4px; }
.result { margin:6px 0; padding:10px; border-radius:6px; background:#1a1a1a; font-size:13px; }
.ok { border-left:3px solid #1db954; }
.fail { border-left:3px solid #ff4444; }
.info { border-left:3px solid #888; }
audio { display:block; margin-top:4px; width:100%; }
</style>
</head>
<body>
<h2>Debug Album Previews</h2>
<div style="margin-bottom:12px;">
  <input id="artist" placeholder="Artiste" value="The Weeknd" />
  <input id="album" placeholder="Album" value="After Hours (Deluxe)" style="margin-left:6px;" />
  <button onclick="testAll()">Tester</button>
</div>
<div id="results"></div>
<script>
const CLIENT_ID='3f3173e083604096abe93d93e05a8867', CLIENT_SECRET='76dff06debf5467aa7fe2dc911779134';
let tok='';
async function getToken(){if(tok)return tok;const r=await fetch('https://accounts.spotify.com/api/token',{method:'POST',headers:{'Content-Type':'application/x-www-form-urlencoded','Authorization':'Basic '+btoa(CLIENT_ID+':'+CLIENT_SECRET)},body:'grant_type=client_credentials'});tok=(await r.json()).access_token;return tok;}

function normalize(str){return str.toLowerCase().trim().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9\s]/g,' ').replace(/\s+/g,' ').trim();}

function log(id,type,msg){let el=document.getElementById('r-'+id);if(!el){el=document.createElement('div');el.id='r-'+id;document.getElementById('results').appendChild(el);}el.className='result '+type;el.innerHTML='<strong>'+id+'</strong><br>'+msg;}

async function testAll() {
  document.getElementById('results').innerHTML = '';
  const artistInput = document.getElementById('artist').value.trim();
  const albumInput  = document.getElementById('album').value.trim();
  const artistNorm  = normalize(artistInput);
  const albumNorm   = normalize(albumInput);
  log('params','info',`norm album: "${albumNorm}"`);

  const t = await getToken();

  // 1. Get Spotify album UPC
  const rs = await fetch(`https://api.spotify.com/v1/search?q=${encodeURIComponent(artistInput+' '+albumInput)}&type=album&limit=5`,{headers:{Authorization:'Bearer '+t}});
  const ds = await rs.json();
  const spotifyAlbums = ds.albums?.items || [];
  log('Spotify albums','info', spotifyAlbums.map(a=>`${a.name} [${a.id}]`).join('<br>')||'Aucun');

  for (const alb of spotifyAlbums.slice(0,2)) {
    const r2 = await fetch(`https://api.spotify.com/v1/albums/${alb.id}`,{headers:{Authorization:'Bearer '+t}});
    const full = await r2.json();
    const upc = full.external_ids?.upc;
    log(`UPC ${alb.name}`,'info',`UPC: <b>${upc}</b>`);

    // Test UPC lookup
    for (const country of ['us','fr','gb']) {
      try {
        const r3 = await fetch(`https://itunes.apple.com/lookup?upc=${upc}&entity=song&country=${country}`);
        const d3 = await r3.json();
        const songs = d3.results?.filter(s=>s.kind==='song'&&s.previewUrl)||[];
        log(`UPC (${country}) ${alb.name}`, songs.length?'ok':'fail',
          songs.length ? `✅ ${songs.length} previews — ex: ${songs[0].trackName}<audio controls src="${songs[0].previewUrl}"></audio>` : `❌ 0 previews (${d3.resultCount} résultats)`);
      } catch(e){log(`UPC (${country})`,'fail',e.message);}
    }
  }

  // 2. Test via artistId iTunes
  for (const country of ['us','fr','gb']) {
    try {
      const r = await fetch(`https://itunes.apple.com/search?term=${encodeURIComponent(artistNorm)}&entity=musicArtist&limit=3&country=${country}`);
      const d = await r.json();
      const artist = d.results?.find(a=>a.wrapperType==='artist')||d.results?.[0];
      if (!artist) { log(`Artist iTunes (${country})`,'fail','Aucun artiste'); continue; }

      const r2 = await fetch(`https://itunes.apple.com/lookup?id=${artist.artistId}&entity=album&limit=50&country=${country}`);
      const d2 = await r2.json();
      const albums = d2.results?.filter(a=>a.wrapperType==='collection')||[];

      const scored = albums.map(a=>{
        const n=normalize(a.collectionName||'');
        let s=0;
        if(n===albumNorm)s=100;
        else if(n.startsWith(albumNorm)&&albumNorm.length>3)s=80;
        else if(n.includes(albumNorm)&&albumNorm.length>3)s=60;
        else if(albumNorm.startsWith(n)&&n.length>3)s=40;
        else if(albumNorm.includes(n)&&n.length>3)s=20;
        return{...a,score:s};
      }).filter(a=>a.score>0).sort((a,b)=>b.score-a.score);

      log(`iTunes scored (${country})`,'info',scored.slice(0,5).map(a=>`"${a.collectionName}" [${a.collectionId}] score=${a.score} norm:"${normalize(a.collectionName||'')}"`).join('<br>')||'Aucun match');

      for (const alb of scored.slice(0,5)) {
        const r3 = await fetch(`https://itunes.apple.com/lookup?id=${alb.collectionId}&entity=song&country=${country}`);
        const d3 = await r3.json();
        const songs = d3.results?.filter(s=>s.kind==='song'&&s.previewUrl)||[];
        log(`Songs "${alb.collectionName}" (${country})`, songs.length?'ok':'fail',
          songs.length ? `✅ ${songs.length} previews — ex: ${songs[0].trackName}<audio controls src="${songs[0].previewUrl}"></audio>` : `❌ 0 previews`);
      }
    } catch(e){log(`Error (${country})`,'fail',e.message);}
  }
}
</script>
</body>
</html>
