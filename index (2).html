<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RankTune</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0a0f;
  --surface: #13131a;
  --surface2: #1c1c26;
  --accent: #1db954;
  --accent2: #1ed760;
  --text: #f0ede8;
  --muted: #8888a0;
  --border: rgba(255,255,255,0.08);
}
* { margin:0; padding:0; box-sizing:border-box; }
body { background:var(--bg); color:var(--text); font-family:'DM Sans',sans-serif; min-height:100vh; }
.container { max-width:900px; margin:0 auto; padding:0 20px; }

header { text-align:center; padding:52px 0 36px; }
.logo { font-family:'Playfair Display',serif; font-size:clamp(34px,6vw,56px); font-weight:700; letter-spacing:-1px; }
.logo span { color:var(--accent); font-style:italic; }
.tagline { font-size:13px; color:var(--muted); margin-top:6px; letter-spacing:2px; text-transform:uppercase; }

.search-bar { display:flex; gap:10px; margin-bottom:28px; flex-wrap:wrap; }
.search-bar input {
  flex:1; min-width:140px; background:var(--surface); border:1px solid var(--border);
  border-radius:12px; padding:13px 18px; font-family:'DM Sans',sans-serif;
  font-size:15px; color:var(--text); outline:none; transition:border-color .2s;
}
.search-bar input:focus { border-color:var(--accent); }
input::placeholder { color:var(--muted); }
.btn {
  background:var(--accent); color:#000; border:none; padding:13px 24px;
  border-radius:12px; font-family:'DM Sans',sans-serif; font-size:15px;
  font-weight:500; cursor:pointer; transition:background .2s; white-space:nowrap;
}
.btn:hover { background:var(--accent2); }
.btn-ghost {
  background:transparent; color:var(--text); border:1px solid var(--border);
  padding:11px 20px; border-radius:12px; font-family:'DM Sans',sans-serif;
  font-size:14px; cursor:pointer; transition:border-color .2s;
}
.btn-ghost:hover { border-color:var(--muted); }

.section-label { font-size:11px; letter-spacing:2px; text-transform:uppercase; color:var(--muted); margin-bottom:16px; }

.artists-list { display:flex; flex-direction:column; gap:8px; margin-bottom:24px; }
.artist-card {
  display:flex; align-items:center; gap:14px; padding:12px 16px;
  background:var(--surface); border:1px solid var(--border); border-radius:12px;
  cursor:pointer; transition:all .2s;
}
.artist-card:hover { border-color:var(--accent); background:rgba(29,185,84,0.05); }
.artist-avatar { width:48px; height:48px; border-radius:50%; object-fit:cover; flex-shrink:0; }
.artist-info-name { font-size:15px; font-weight:500; }
.artist-info-followers { font-size:12px; color:var(--muted); margin-top:2px; }

.group-separator {
  display:flex; align-items:center; gap:12px; margin:24px 0 16px;
}
.group-separator-line { flex:1; height:1px; background:var(--border); }
.group-separator-label { font-size:11px; letter-spacing:2px; text-transform:uppercase; color:var(--muted); white-space:nowrap; }
.albums-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(150px,1fr)); gap:14px; margin-bottom:40px; }
.album-card {
  background:var(--surface); border:1px solid var(--border); border-radius:12px;
  padding:12px; cursor:pointer; transition:all .2s; display:flex; flex-direction:column; gap:8px;
}
.album-card:hover { border-color:var(--accent); transform:translateY(-2px); }
.album-card img { width:100%; aspect-ratio:1; border-radius:8px; object-fit:cover; display:block; }
.album-name { font-size:13px; font-weight:500; line-height:1.3; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
.album-meta { font-size:11px; color:var(--muted); }

#ranking-section { display:none; padding-bottom:60px; }
.back-btn {
  display:inline-flex; align-items:center; gap:6px; background:transparent;
  border:none; color:var(--muted); font-family:'DM Sans',sans-serif; font-size:13px;
  cursor:pointer; padding:0; margin-bottom:28px; transition:color .2s;
}
.back-btn:hover { color:var(--text); }

.album-header {
  display:flex; align-items:center; gap:16px; margin-bottom:28px;
  padding:18px; background:var(--surface); border:1px solid var(--border); border-radius:14px;
}
.album-header img { width:68px; height:68px; border-radius:8px; object-fit:cover; flex-shrink:0; }
.album-header h3 { font-family:'Playfair Display',serif; font-size:20px; font-weight:700; }
.album-header p { font-size:13px; color:var(--muted); margin-top:4px; }

.progress-wrap { margin-bottom:28px; }
.progress-label { display:flex; justify-content:space-between; font-size:12px; color:var(--muted); margin-bottom:8px; }
.progress-bar { height:3px; background:var(--surface2); border-radius:999px; overflow:hidden; }
.progress-fill { height:100%; background:var(--accent); border-radius:999px; transition:width .4s; }

.duel-label { text-align:center; font-size:11px; letter-spacing:2px; text-transform:uppercase; color:var(--muted); margin-bottom:18px; }

.duel-arena { display:grid; grid-template-columns:1fr auto 1fr; gap:16px; align-items:stretch; margin-bottom:24px; max-width:600px; margin-left:auto; margin-right:auto; }
.vs-badge { font-family:'Playfair Display',serif; font-size:22px; font-style:italic; color:var(--muted); text-align:center; opacity:.5; display:flex; align-items:center; }

.duel-card {
  background:var(--surface); border:1px solid var(--border); border-radius:16px;
  cursor:pointer; transition:all .25s; overflow:hidden; display:flex; flex-direction:column;
}
.duel-card:hover { border-color:var(--accent); transform:scale(1.02); }
.duel-card:active { transform:scale(0.98); }
.duel-cover { width:100%; aspect-ratio:1; object-fit:cover; display:block; }
.duel-info { padding:14px 16px 16px; display:flex; flex-direction:column; gap:4px; }
.duel-track-num { font-size:11px; color:var(--muted); letter-spacing:1px; }
.duel-track-name { font-family:'Playfair Display',serif; font-size:clamp(14px,2.5vw,20px); font-weight:700; line-height:1.2; }
.duel-track-dur { font-size:12px; color:var(--muted); }

.preview-btn {
  display:inline-flex; align-items:center; gap:6px;
  background:transparent; border:1px solid var(--border);
  border-radius:20px; padding:5px 12px; margin-top:6px;
  font-family:'DM Sans',sans-serif; font-size:12px; color:var(--muted);
  cursor:pointer; transition:all .2s; width:fit-content;
}
.preview-btn:hover { border-color:var(--accent); color:var(--accent); }
.preview-btn.playing { border-color:var(--accent); color:var(--accent); background:rgba(29,185,84,0.1); }
.preview-btn.unavailable { opacity:0.3; cursor:not-allowed; }

.controls-row { display:flex; justify-content:center; gap:12px; margin-bottom:40px; }

.results-header { text-align:center; margin-bottom:28px; }
.results-header h2 { font-family:'Playfair Display',serif; font-size:30px; font-weight:700; }
.results-header p { font-size:13px; color:var(--muted); margin-top:6px; }

.ranking-list { display:flex; flex-direction:column; gap:8px; margin-bottom:32px; }
.rank-item {
  display:flex; align-items:center; gap:16px; padding:14px 18px;
  background:var(--surface); border:1px solid var(--border); border-radius:12px;
  animation:slideUp .3s ease both;
}
@keyframes slideUp { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
.rank-num { font-family:'Playfair Display',serif; font-size:22px; font-weight:700; color:var(--muted); min-width:32px; text-align:right; flex-shrink:0; }
.rank-num.gold { color:#f5c518; }
.rank-num.silver { color:#c0c0c0; }
.rank-num.bronze { color:#cd7f32; }
.rank-name { flex:1; font-size:15px; font-weight:500; }
.rank-dur { font-size:12px; color:var(--muted); }

.share-row { display:flex; justify-content:center; gap:12px; flex-wrap:wrap; }

.reco-card {
  display:flex; align-items:center; gap:14px; padding:12px 16px;
  background:var(--surface); border:1px solid var(--border); border-radius:12px;
  animation:slideUp .3s ease both;
}
.reco-cover { width:52px; height:52px; border-radius:8px; object-fit:cover; flex-shrink:0; }
.reco-info { flex:1; }
.reco-name { font-size:14px; font-weight:500; }
.reco-artist { font-size:12px; color:var(--muted); margin-top:2px; }
.reco-open {
  background:var(--accent); color:#000; border:none; padding:7px 14px;
  border-radius:20px; font-family:'DM Sans',sans-serif; font-size:12px;
  font-weight:500; cursor:pointer; transition:background .2s; white-space:nowrap; flex-shrink:0;
}
.reco-open:hover { background:var(--accent2); }

.loader { text-align:center; padding:40px; color:var(--muted); font-size:14px; }
.spinner { display:inline-block; width:18px; height:18px; border:2px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin .7s linear infinite; margin-right:8px; vertical-align:middle; }
@keyframes spin { to{transform:rotate(360deg)} }
.error-msg { background:rgba(255,60,60,.08); border:1px solid rgba(255,60,60,.2); color:#ff6b6b; border-radius:10px; padding:12px 16px; font-size:13px; margin-top:12px; }

@media(max-width:540px){
  .albums-grid { grid-template-columns:repeat(2,1fr); }
  .duel-arena { grid-template-columns:1fr 24px 1fr; gap:8px; }
}

/* Language selector */
.lang-selector {
  position:fixed; top:16px; right:16px; z-index:100;
  display:flex; align-items:center; gap:6px;
}
.lang-btn {
  background:var(--surface); border:1px solid var(--border);
  border-radius:20px; padding:6px 12px; font-size:13px;
  cursor:pointer; color:var(--text); font-family:'DM Sans',sans-serif;
  transition:all .2s; display:flex; align-items:center; gap:6px;
}
.lang-btn:hover { border-color:var(--accent); }
.lang-dropdown {
  position:absolute; top:calc(100% + 8px); right:0;
  background:var(--surface); border:1px solid var(--border);
  border-radius:12px; overflow:hidden; display:none; min-width:140px;
  box-shadow: 0 8px 24px rgba(0,0,0,0.4);
}
.lang-dropdown.open { display:block; }
.lang-option {
  padding:10px 16px; cursor:pointer; font-size:14px;
  display:flex; align-items:center; gap:10px; transition:background .15s;
}
.lang-option:hover { background:var(--surface2); }
.lang-option.active { color:var(--accent); }

/* RTL support for Hebrew */
body.rtl { direction:rtl; }
body.rtl .back-btn { flex-direction:row-reverse; }
body.rtl .album-header { flex-direction:row-reverse; }
</style>
</head>
<body>

        <div class="duel-card" id="card-b">
          <img class="duel-cover" id="cover-b" src="" alt="">
          <div class="duel-info">
            <div class="duel-track-num" id="num-b"></div>
            <div class="duel-track-name" id="name-b"></div>
            <div class="duel-track-dur" id="dur-b"></div>

        <button class="btn-ghost" id="new-album-btn" data-i18n="other_album">Autre album</button>
      </div>
    </div>
  </div>
</div>

<script>
const CLIENT_ID     = '3f3173e083604096abe93d93e05a8867';
const CLIENT_SECRET = '76dff06debf5467aa7fe2dc911779134';

// ── Translations ───────────────────────────────────────────
const i18n = {

};

let currentLang = localStorage.getItem('ranktune_lang') || 'fr';

function t(key) {
  return i18n[currentLang]?.[key] || i18n['en'][key] || key;
}

function applyLang() {
  const isHe = currentLang === 'he';
  document.body.classList.toggle('rtl', isHe);
  document.documentElement.lang = currentLang;

  // Mettre à jour tous les éléments data-i18n
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const key = el.getAttribute('data-i18n');
    if (key === 'listen' && el.classList.contains('playing')) return;
    el.textContent = t(key);
  });
  document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
    el.placeholder = t(el.getAttribute('data-i18n-placeholder'));
  });

  // Drapeau et label
  const flags = { fr: '🇫🇷', en: '🇬🇧', he: '🇮🇱' };
  const labels = { fr: 'FR', en: 'EN', he: 'HE' };
  document.getElementById('lang-flag').textContent = flags[currentLang];
  document.getElementById('lang-label').textContent = labels[currentLang];

  // Marquer l'option active
  document.querySelectorAll('.lang-option').forEach(el => {
    const lang = el.getAttribute('onclick').match(/'(\w+)'/)[1];
    el.classList.toggle('active', lang === currentLang);
  });

  // Mettre à jour les éléments dynamiques visibles
  const previewA = document.getElementById('preview-a');
  const previewB = document.getElementById('preview-b');
  if (previewA && !previewA.classList.contains('playing') && !previewA.classList.contains('unavailable'))
    previewA.textContent = t('listen');
  if (previewB && !previewB.classList.contains('playing') && !previewB.classList.contains('unavailable'))
    previewB.textContent = t('listen');
}

function setLang(lang) {
  currentLang = lang;
  localStorage.setItem('ranktune_lang', lang);
  applyLang();
  toggleLangDropdown(false);
}

function toggleLangDropdown(force) {
  const dd = document.getElementById('lang-dropdown');
  const isOpen = dd.classList.contains('open');
  dd.classList.toggle('open', force !== undefined ? force : !isOpen);
}

document.addEventListener('click', e => {
  if (!e.target.closest('.lang-selector')) toggleLangDropdown(false);
});

// Appliquer la langue au chargement
applyLang();

let _token = '', _tokenExp = 0;

async function getToken() {
  if (_token && Date.now() < _tokenExp) return _token;
  const r = await fetch('https://accounts.spotify.com/api/token', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/x-www-form-urlencoded',
      'Authorization': 'Basic ' + btoa(CLIENT_ID + ':' + CLIENT_SECRET)
    },
    body: 'grant_type=client_credentials'
  });
  const d = await r.json();
  _token    = d.access_token;
  _tokenExp = Date.now() + d.expires_in * 1000 - 30000;
  return _token;
}

async function spFetch(path, params = {}) {
  const tok = await getToken();
  const qs  = Object.keys(params).length ? '?' + new URLSearchParams(params) : '';
  const r   = await fetch('https://api.spotify.com/v1' + path + qs, {
    headers: { Authorization: 'Bearer ' + tok }
  });
  if (!r.ok) throw new Error('Spotify ' + r.status);
  return r.json();
}

async function doLinkImport() {
  const input = document.getElementById('link-input').value.trim();
  if (!input) return;
  const statusEl  = document.getElementById('search-status');
  const resultsEl = document.getElementById('albums-results');
  statusEl.innerHTML  = '<div class="loader"><span class="spinner"></span>Chargement...</div>';
  resultsEl.innerHTML = '';
  try {
    // Lien artiste
    const artistId = extractSpotifyId(input, 'artist');
    if (artistId) {
      const artist = await spFetch(`/artists/${artistId}`);
      loadArtistAlbums(artist, '');
      return;
    }
    // Lien album
    const albumId = extractSpotifyId(input, 'album');
    if (albumId) {
      const alb = await spFetch(`/albums/${albumId}`);
      statusEl.innerHTML = '';
      selectAlbum(alb, alb.images[0]?.url || '');
      return;
    }
    // Lien playlist
    const playlistId = extractSpotifyId(input, 'playlist');
    if (playlistId) {
      await loadPlaylist(playlistId);
      return;
    }
    statusEl.innerHTML = '<div class="error-msg">Lien non reconnu. Utilisez un lien Spotify artiste, album ou playlist.</div>';
  } catch(e) {
    statusEl.innerHTML = `<div class="error-msg">Erreur : ${e.message}</div>`;
  }
}

async function loadPlaylist(playlistId) {
  const statusEl  = document.getElementById('search-status');
  const resultsEl = document.getElementById('albums-results');
  try {
    const pl = await spFetch(`/playlists/${playlistId}`);
    let items = [], offset = 0;
    while (true) {
      const d = await spFetch(`/playlists/${playlistId}/tracks`, { limit:50, offset });
      items = items.concat(d.items);
      if (!d.next) break;
      offset += 50;
    }
    const cover = pl.images[0]?.url || '';
    const fakeTracks = items
      .filter(it => it.track && it.track.id)
      .map((it, idx) => ({
        id: it.track.id,
        name: it.track.name,
        track_number: idx + 1,
        duration_ms: it.track.duration_ms,
        preview_url: it.track.preview_url || null,
        // Garder l'artiste du track pour iTunes fallback
        artists: it.track.artists || [],
        cover: it.track.album?.images[0]?.url || cover
      }));
    if (!fakeTracks.length) {
      statusEl.innerHTML = `<div class="error-msg">Playlist vide ou inaccessible.</div>`;
      return;
    }
    currentAlbum = { name: pl.name, artists: [{ name: 'Playlist' }], release_date: '', total_tracks: fakeTracks.length };
    albumCover   = cover;
    tracks       = fakeTracks;
    albumPreviewCache = {}; // Pas de cache global pour les playlists — chaque track cherche via son propre artiste

    document.getElementById('search-section').style.display  = 'none';
    document.getElementById('ranking-section').style.display = 'block';
    document.getElementById('duel-phase').style.display      = 'block';
    document.getElementById('results-phase').style.display   = 'none';

    document.getElementById('sel-img').src          = cover;
    document.getElementById('sel-name').textContent = pl.name;
    document.getElementById('sel-meta').textContent = fakeTracks.length + ' ' + t('tracks') + ' · Playlist';
    statusEl.innerHTML = '';
    initRanking();
  } catch(e) {
    statusEl.innerHTML = `<div class="error-msg">Erreur playlist : ${e.message}</div>`;
  }
}

async function doSearch() {
  const artistQuery = document.getElementById('artist-input').value.trim();
  const albumQuery  = document.getElementById('album-input').value.trim();
  if (!artistQuery && !albumQuery) return;

  const statusEl  = document.getElementById('search-status');
  const resultsEl = document.getElementById('albums-results');
  statusEl.innerHTML  = `<div class="loader"><span class="spinner"></span>${t('searching')}</div>`;
  resultsEl.innerHTML = '';

  try {
    // Lien artiste dans le champ artiste
    const artistIdFromUrl = extractSpotifyId(artistQuery, 'artist');
    if (artistIdFromUrl) {
      const artist = await spFetch(`/artists/${artistIdFromUrl}`);
      statusEl.innerHTML = '<div class="loader"><span class="spinner"></span>Chargement des albums...</div>';
      loadArtistAlbums(artist, albumQuery);
      return;
    }

    // Seulement un nom d'album (champ artiste vide)
    if (!artistQuery && albumQuery) {
      const data = await spFetch('/search', { q: `"${albumQuery}"`, type:'album', limit:50 });
      let albums = data.albums.items;
      // Filtre strict : nom exact (insensible à la casse)
      const q = albumQuery.toLowerCase();
      albums = albums.filter(a => a.name.toLowerCase() === q);
      albums.sort((a,b) => (a.release_date||'').localeCompare(b.release_date||''));
      statusEl.innerHTML = '';
      if (!albums.length) { statusEl.innerHTML = '<div class="error-msg">Aucun album avec ce nom exact.</div>'; return; }
      statusEl.innerHTML = `<p class="section-label">${albums.length} résultat(s)</p>`;
      const grid = document.createElement('div');
      grid.className = 'albums-grid';
      albums.forEach(alb => {
        const img = alb.images[0]?.url || '';
        const card = document.createElement('div');
        card.className = 'album-card';
        card.innerHTML = `<img src="${img}" alt="${alb.name}" loading="lazy">
          <div class="album-name">${alb.name}</div>
          <div class="album-meta">${alb.artists.map(a=>a.name).join(', ')} · ${alb.release_date?.slice(0,4)||''}</div>`;
        card.addEventListener('click', () => selectAlbum(alb, img));
        grid.appendChild(card);
      });
      resultsEl.appendChild(grid);
      return;
    }

    // Recherche par nom d'artiste
    const data = await spFetch('/search', { q: artistQuery, type:'artist', limit:20 });
    let artists = data.artists.items;
    const queryLower = artistQuery.toLowerCase();

    // 1. Correspondance exacte en premier
    // 2. Commence par le nom en second
    // 3. Popularité en dernier recours
    artists.sort((a, b) => {
      const aName = a.name.toLowerCase();
      const bName = b.name.toLowerCase();
      const aExact = aName === queryLower ? 0 : aName.startsWith(queryLower) ? 1 : 2;
      const bExact = bName === queryLower ? 0 : bName.startsWith(queryLower) ? 1 : 2;
      if (aExact !== bExact) return aExact - bExact;
      return (b.popularity||0) - (a.popularity||0);
    });

    statusEl.innerHTML = '';
    if (!artists.length) { statusEl.innerHTML = `<div class="error-msg">${t('no_artist')}</div>`; return; }

    const exactMatches = artists.filter(a => a.name.toLowerCase() === queryLower);
    if (exactMatches.length === 1) {
      statusEl.innerHTML = '<div class="loader"><span class="spinner"></span>Chargement des albums...</div>';
      loadArtistAlbums(exactMatches[0], albumQuery);
      return;
    }

    statusEl.innerHTML = `<p class="section-label">${t('choose_artist')}</p>`;
    const list = document.createElement('div');
    list.className = 'artists-list';
    artists.forEach(artist => {
      const img = artist.images[0]?.url || '';
      const followers = artist.followers?.total ? artist.followers.total.toLocaleString() + ' ' + t('followers') : '';
      const card = document.createElement('div');
      card.className = 'artist-card';
      card.innerHTML = img
        ? `<img class="artist-avatar" src="${img}" alt="${artist.name}">`
        : `<div class="artist-avatar" style="background:var(--surface2)"></div>`;
      card.innerHTML += `<div><div class="artist-info-name">${artist.name}</div>${followers ? `<div class="artist-info-followers">${followers}</div>` : ''}</div>`;
      card.addEventListener('click', () => {
        statusEl.innerHTML = `<div class="loader"><span class="spinner"></span>${t('loading')}</div>`;
        resultsEl.innerHTML = '';
        loadArtistAlbums(artist, albumQuery);
      });
      list.appendChild(card);
    });
    resultsEl.appendChild(list);

  } catch(e) {
    statusEl.innerHTML = `<div class="error-msg">Erreur : ${e.message}</div>`;
  }
}

function extractSpotifyId(input, type) {
  const urlMatch = input.match(new RegExp(`open\\.spotify\\.com\\/${type}\\/([A-Za-z0-9]+)`));
  if (urlMatch) return urlMatch[1];
  const uriMatch = input.match(new RegExp(`spotify:${type}:([A-Za-z0-9]+)`));
  if (uriMatch) return uriMatch[1];
  return null;
}

async function loadArtistAlbums(artist, albumFilter = '') {
  const statusEl  = document.getElementById('search-status');
  const resultsEl = document.getElementById('albums-results');

  try {
    let albums = [], deluxe = [], eps = [], singles = [];
    const seen = new Set();
    const seenDeluxe = new Set();

    function normalizeAlbumName(name) {
      return name.toLowerCase()
        .replace(/\(.*?\)/g, '')
        .replace(/\[.*?\]/g, '')
        .replace(/deluxe|remastered|edition|version|bonus/gi, '')
        .trim();
    }

    function isDeluxe(name) {
      return /deluxe|remastered|edition|bonus|extended/i.test(name);
    }

    // Albums + EPs + compilations
    let offsetA = 0;
    while (true) {
      const d = await spFetch(`/artists/${artist.id}/albums`, {
        include_groups: 'album,compilation', limit:50, offset:offsetA
      });
      for (const alb of d.items) {
        const key = normalizeAlbumName(alb.name);
        if (alb.album_type === 'single' || (alb.total_tracks <= 6 && alb.album_type !== 'album')) {
          if (!seen.has(key)) { seen.add(key); eps.push(alb); }
        } else if (isDeluxe(alb.name)) {
          if (!seenDeluxe.has(key)) { seenDeluxe.add(key); deluxe.push(alb); }
        } else {
          if (!seen.has(key)) { seen.add(key); albums.push(alb); }
        }
      }
      offsetA += 50;
      if (!d.next) break;
    }

    // Singles
    let offsetS = 0;
    while (true) {
      const d = await spFetch(`/artists/${artist.id}/albums`, {
        include_groups: 'single', limit:50, offset:offsetS
      });
      for (const alb of d.items) {
        const key = normalizeAlbumName(alb.name);
        if (!seen.has(key)) {
          seen.add(key);
          if (alb.total_tracks > 2) eps.push(alb);
          else singles.push(alb);
        }
      }
      offsetS += 50;
      if (!d.next) break;
    }

    // Filtre par nom si précisé
    if (albumFilter) {
      const f = albumFilter.toLowerCase();
      albums  = albums.filter(a => a.name.toLowerCase().includes(f));
      deluxe  = deluxe.filter(a => a.name.toLowerCase().includes(f));
      eps     = eps.filter(a => a.name.toLowerCase().includes(f));
      singles = singles.filter(a => a.name.toLowerCase().includes(f));
    }

    [albums, deluxe, eps, singles].forEach(arr => arr.sort((a,b) => (a.release_date||'').localeCompare(b.release_date||'')));

    statusEl.innerHTML = '';
    resultsEl.innerHTML = '';

    if (!albums.length && !deluxe.length && !eps.length && !singles.length) {
      statusEl.innerHTML = '<div class="error-msg">Aucun album trouvé pour cet artiste.</div>';
      return;
    }

    function renderGroup(label, items) {
      if (!items.length) return;
      const sep = document.createElement('div');
      sep.className = 'group-separator';
      sep.innerHTML = `<div class="group-separator-line"></div><div class="group-separator-label">${label}</div><div class="group-separator-line"></div>`;
      resultsEl.appendChild(sep);
      const grid = document.createElement('div');
      grid.className = 'albums-grid';
      items.forEach(alb => {
        const img  = alb.images[0]?.url || '';
        const year = alb.release_date?.slice(0,4) || '';
        const card = document.createElement('div');
        card.className = 'album-card';
        card.innerHTML = `
          <img src="${img}" alt="${alb.name}" loading="lazy">
          <div class="album-name">${alb.name}</div>
          <div class="album-meta">${year} · ${alb.total_tracks} ${alb.total_tracks>1?t('tracks'):t('track_single')}</div>`;
        card.addEventListener('click', () => selectAlbum(alb, img));
        grid.appendChild(card);
      });
      resultsEl.appendChild(grid);
    }

    renderGroup(t('albums_label'), albums);
    renderGroup(t('deluxe_label'), deluxe);
    renderGroup(t('eps_label'), eps);
    renderGroup(t('singles_label'), singles);

  } catch(e) {
    statusEl.innerHTML = `<div class="error-msg">Erreur : ${e.message}</div>`;
  }
}

async function selectAlbum(alb, cover) {
  currentAlbum = alb;
  albumCover   = cover;

  document.getElementById('search-section').style.display  = 'none';
  document.getElementById('ranking-section').style.display = 'block';
  document.getElementById('duel-phase').style.display      = 'block';
  document.getElementById('results-phase').style.display   = 'none';

  document.getElementById('sel-img').src          = cover;
  document.getElementById('sel-name').textContent = alb.name;
  document.getElementById('sel-meta').textContent =
    alb.artists.map(a=>a.name).join(', ') + ' · ' + (alb.release_date?.slice(0,4)||'') + ' · ' + alb.total_tracks + ' ' + (alb.total_tracks>1?t('tracks'):t('track_single'));
  document.getElementById('prog-txt').textContent = 'Chargement...';

  try { tracks = await fetchAllTracks(alb.id); }
  catch(e) { alert('Erreur : ' + e.message); return; }

  // Récupérer l'album complet avec UPC depuis Spotify
  try {
    const fullAlbum = await spFetch(`/albums/${alb.id}`);
    alb = { ...alb, ...fullAlbum };
  } catch(e) {}

  await loadAppleMusicPreviews(alb);
  initRanking();
}

async function fetchAllTracks(albumId) {
  let all = [], offset = 0;
  while (true) {
    const d = await spFetch(`/albums/${albumId}/tracks`, { limit:50, offset });
    all = all.concat(d.items);
    if (!d.next) break;
    offset += 50;
  }
  // Récupérer les détails complets (ISRC + preview_url) par batch de 50
  const fullTracks = [];
  for (let i = 0; i < all.length; i += 50) {
    const ids = all.slice(i, i+50).map(t => t.id).join(',');
    try {
      const d = await spFetch(`/tracks`, { ids });
      fullTracks.push(...(d.tracks || []));
    } catch(e) {
      fullTracks.push(...all.slice(i, i+50));
    }
  }
  return fullTracks;
}

// Audio preview
let currentAudio = null;
let previewUrls = { a: null, b: null };

// Cache de previews : trackName → previewUrl (chargé une fois par album)
let albumPreviewCache = {};

// Cherche l'Apple Music album ID et charge tous les previews d'un coup
async function loadAppleMusicPreviews(alb) {
  albumPreviewCache = {};
  const albumName = alb.name;
  const artistName = alb.artists?.[0]?.name || '';
  const albumNameLower = albumName.toLowerCase().trim();
  const artistNameLower = artistName.toLowerCase().trim();

  // Normalise les accents pour la comparaison
  function normalize(str) {
    return str.toLowerCase().trim()
      .normalize('NFD').replace(/[\u0300-\u036f]/g, '')
      .replace(/[^a-z0-9\s]/g, ' ').replace(/\s+/g, ' ').trim();
  }
  const albumNorm   = normalize(albumName);
  const artistNorm  = normalize(artistName);

  async function fetchPreviewsById(collectionId, country) {
    const r = await fetch(`https://itunes.apple.com/lookup?id=${collectionId}&entity=song&country=${country}`);
    const d = await r.json();
    const songs = d.results?.filter(t => t.kind === 'song' && t.previewUrl) || [];
    songs.forEach(s => {
      const key = s.trackName?.toLowerCase().trim();
      if (key && !albumPreviewCache[key]) albumPreviewCache[key] = s.previewUrl;
    });
    return songs.length > 0;
  }

  // Mapping manuel Spotify ID → Apple Music ID pour les albums introuvables via recherche
  const SPOTIFY_TO_AM = {
    '22NwdsP47PnWsA58u3z7S9': { id: '1757802855', country: 'fr' }, // SDM - À la vie à la mort
  };

  // 0a. Mapping manuel
  if (alb.id && SPOTIFY_TO_AM[alb.id]) {
    const { id, country } = SPOTIFY_TO_AM[alb.id];
    await fetchPreviewsById(id, country);
    if (Object.keys(albumPreviewCache).length > 0) {
      console.log(`Mapping manuel: ${Object.keys(albumPreviewCache).length} previews`);
      return;
    }
  }

  // 0b. Recherche par artiste seul dans FR/GB
  // 0b. Recherche via artistId iTunes (plus fiable que recherche texte)
  for (const country of ['fr', 'gb', 'il', 'us']) {
    try {
      // Trouver l'artistId iTunes
      const r = await fetch(`https://itunes.apple.com/search?term=${encodeURIComponent(artistNorm)}&entity=musicArtist&limit=5&country=${country}`);
      const d = await r.json();
      const artists = d.results?.filter(a => a.wrapperType === 'artist') || [];
      const artistMatch = artists.find(a => normalize(a.artistName || '') === artistNorm)
                       || artists[0];
      if (!artistMatch) continue;

      // Récupérer tous ses albums
      const r2 = await fetch(`https://itunes.apple.com/lookup?id=${artistMatch.artistId}&entity=album&limit=50&country=${country}`);
      const d2 = await r2.json();
      const albums = d2.results?.filter(a => a.wrapperType === 'collection') || [];

      // Scoring : préférer le match le plus précis
      const scored = albums.map(a => {
        const aName = normalize(a.collectionName || '');
        let score = 0;
        if (aName === albumNorm) score = 100;
        else if (aName.startsWith(albumNorm) && albumNorm.length > 3) score = 80;
        else if (aName.includes(albumNorm) && albumNorm.length > 3) score = 60;
        else if (albumNorm.startsWith(aName) && aName.length > 3) score = 40;
        else if (albumNorm.includes(aName) && aName.length > 3) score = 20;
        return { ...a, score };
      }).filter(a => a.score > 0).sort((a, b) => b.score - a.score);

      if (scored.length) {
        for (const album of scored.slice(0, 5)) {
          await fetchPreviewsById(album.collectionId, country);
        }
        if (Object.keys(albumPreviewCache).length > 0) {
          return;
        }
      }
    } catch(e) {}
  }

  // 1. UPC — correspondance exacte
  const upc = alb.external_ids?.upc;
  if (upc) {
    for (const country of ['fr', 'gb', 'il', 'us']) {
      try {
        const r = await fetch(`https://itunes.apple.com/lookup?upc=${upc}&entity=song&country=${country}`);
        const d = await r.json();
        const songs = d.results?.filter(t => t.kind === 'song' && t.previewUrl) || [];
        if (songs.length) {
          songs.forEach(s => {
            const key = s.trackName?.toLowerCase().trim();
            if (key && !albumPreviewCache[key]) albumPreviewCache[key] = s.previewUrl;
          });
          console.log(`UPC match (${country}): ${songs.length} previews`);
        }
      } catch(e) {}
    }
    if (Object.keys(albumPreviewCache).length > 0) return;
  }

  // 2. Recherche par nom avec score — avec et sans accents
  const queries = [...new Set([
    artistName + ' ' + albumName,
    artistNorm + ' ' + albumNorm,
    albumName,
    albumNorm,
    artistName,
    artistNorm,
  ])];

  for (const country of ['fr', 'gb', 'il', 'us']) {
    for (const query of queries) {
      try {
        const r = await fetch(`https://itunes.apple.com/search?term=${encodeURIComponent(query)}&entity=album&limit=20&country=${country}`);
        const d = await r.json();
        const albums = d.results?.filter(a => a.wrapperType === 'collection') || [];

        const scored = albums.map(a => {
          const aName   = normalize(a.collectionName || '');
          const aArtist = normalize(a.artistName || '');
          let score = 0;
          if (aName === albumNorm) score += 4;
          else if (aName.includes(albumNorm) || albumNorm.includes(aName)) score += 2;
          if (aArtist === artistNorm) score += 3;
          else if (aArtist.includes(artistNorm) || artistNorm.includes(aArtist)) score += 1;
          return { ...a, score };
        }).filter(a => a.score >= 2).sort((a, b) => b.score - a.score);

        for (const album of scored.slice(0, 3)) {
          console.log(`Apple Music (${country}): "${album.collectionName}" score=${album.score}`);
          await fetchPreviewsById(album.collectionId, country);
        }

        if (Object.keys(albumPreviewCache).length > 0) {
          console.log(`${Object.keys(albumPreviewCache).length} previews chargés`);
          return;
        }
      } catch(e) {}
    }
  }
}

async function getPreviewUrl(track) {
  // 1. Spotify preview
  if (track.preview_url) return track.preview_url;

  const trackName = track.name.toLowerCase().trim();
  const artistName = (track.artists?.[0]?.name) || currentAlbum?.artists?.[0]?.name || '';

  // 2. Cache Apple Music (chargé au niveau de l'album)
  if (albumPreviewCache[trackName]) return albumPreviewCache[trackName];

  // 3. Correspondance partielle dans le cache — plusieurs stratégies
  const cacheKeys = Object.keys(albumPreviewCache);

  // 3a. Le titre Spotify contient le titre iTunes (ex: "Nothing Compares - Bonus Track" → "Nothing Compares")
  const match3a = cacheKeys.find(k => trackName.includes(k) && k.length > 4);
  if (match3a) return albumPreviewCache[match3a];

  // 3b. Le titre iTunes contient le titre Spotify
  const match3b = cacheKeys.find(k => k.includes(trackName) && trackName.length > 4);
  if (match3b) return albumPreviewCache[match3b];

  // 3c. Les premiers mots correspondent (ex: "Nothing Compares - Bonus Track" vs "Nothing Compares")
  const firstWords = trackName.split(' ').slice(0, 3).join(' ');
  if (firstWords.length > 4) {
    const match3c = cacheKeys.find(k => k.startsWith(firstWords) || firstWords.startsWith(k.split(' ').slice(0, 3).join(' ')));
    if (match3c) return albumPreviewCache[match3c];
  }

  // 4. Fallback iTunes par titre + artiste (fr/gb en premier pour musique française)
  for (const country of ['fr', 'gb', 'il', 'us']) {
    try {
      const q = encodeURIComponent(artistName + ' ' + track.name);
      const r = await fetch(`https://itunes.apple.com/search?term=${q}&entity=song&limit=15&country=${country}`);
      const d = await r.json();
      const m = d.results?.find(t =>
        t.trackName?.toLowerCase().trim() === trackName && t.previewUrl
      );
      if (m?.previewUrl) return m.previewUrl;
    } catch(e) {}
  }

  return null;
}

async function togglePreview(side, e) {
  e.stopPropagation(); // ne pas déclencher le vote
  const btn = document.getElementById('preview-' + side);
  if (btn.classList.contains('unavailable')) return;

  // Si déjà en lecture sur ce bouton → stop
  if (btn.classList.contains('playing')) {
    currentAudio.pause();
    currentAudio = null;
    btn.textContent = t('listen');
    btn.classList.remove('playing');
    return;
  }

  // Arrêter tout audio en cours
  stopAllPreviews();

  const url = previewUrls[side];
  if (!url) return;

  currentAudio = new Audio(url);
  currentAudio.volume = 0.8;
  currentAudio.play();
  btn.textContent = t('stop');
  btn.classList.add('playing');

  currentAudio.onended = () => {
    btn.textContent = t('listen');
    btn.classList.remove('playing');
    currentAudio = null;
  };
}

function stopAllPreviews() {
  if (currentAudio) { currentAudio.pause(); currentAudio = null; }
  ['a','b'].forEach(s => {
    const btn = document.getElementById('preview-' + s);
    if (btn) { btn.textContent = t('listen'); btn.classList.remove('playing'); }
  });
}

function initRanking() {
  ratings = {};
  history = [];
  tracks.forEach(t => { ratings[t.id] = 1000; });
  comparisons = buildPairs(tracks);
  compIdx = 0;
  updateDuel();
}

function buildPairs(tracks) {
  const pairs = [];
  for (let i=0; i<tracks.length; i++)
    for (let j=i+1; j<tracks.length; j++)
      pairs.push([i,j]);
  for (let i=pairs.length-1; i>0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [pairs[i], pairs[j]] = [pairs[j], pairs[i]];
  }
  return pairs.slice(0, Math.min(pairs.length, tracks.length * 3));
}

function fmtDur(ms) {
  const s = Math.floor(ms/1000);
  return Math.floor(s/60)+':'+String(s%60).padStart(2,'0');
}

function updateDuel() {
  const total = comparisons.length;
  document.getElementById('prog-txt').textContent  = compIdx + ' / ' + total;
  document.getElementById('prog-fill').style.width = (total ? Math.round(compIdx/total*100) : 0) + '%';
  if (compIdx >= total) { showResults(); return; }

  stopAllPreviews();
  previewUrls = { a: null, b: null };

  const [ia, ib] = comparisons[compIdx];
  const ta = tracks[ia], tb = tracks[ib];

  document.getElementById('cover-a').src        = ta.cover || albumCover;
  document.getElementById('cover-b').src        = tb.cover || albumCover;
  document.getElementById('num-a').textContent  = t('track_label') + ' ' + ta.track_number;
  document.getElementById('name-a').textContent = ta.name;
  document.getElementById('dur-a').textContent  = fmtDur(ta.duration_ms);
  document.getElementById('num-b').textContent  = t('track_label') + ' ' + tb.track_number;
  document.getElementById('name-b').textContent = tb.name;
  document.getElementById('dur-b').textContent  = fmtDur(tb.duration_ms);

  // Reset preview buttons
  ['a','b'].forEach(s => {
    const btn = document.getElementById('preview-' + s);
    btn.textContent = t('listen');
    btn.classList.remove('playing', 'unavailable');
  });

  // Charger les previews en arrière-plan
  getPreviewUrl(ta).then(url => {
    previewUrls.a = url;
    const btn = document.getElementById('preview-a');
    if (!url) { btn.textContent = t('no_preview'); btn.classList.add('unavailable'); }
  });
  getPreviewUrl(tb).then(url => {
    previewUrls.b = url;
    const btn = document.getElementById('preview-b');
    if (!url) { btn.textContent = t('no_preview'); btn.classList.add('unavailable'); }
  });

  ['card-a','card-b'].forEach(id => {
    const el = document.getElementById(id);
    el.style.animation='none'; el.offsetHeight;
    el.style.animation='slideUp .2s ease both';
  });
}

function eloUpdate(winId, loseId, draw=false) {
  const K=32, Ra=ratings[winId], Rb=ratings[loseId];
  const Ea = 1/(1+Math.pow(10,(Rb-Ra)/400));
  ratings[winId]  = Ra + K*(draw ? .5 : 1-Ea);
  ratings[loseId] = Rb + K*(draw ? .5 : 0-(1-Ea));
}

document.getElementById('card-a').addEventListener('click', () => {
  if(compIdx>=comparisons.length) return;
  stopAllPreviews();
  const [ia,ib]=comparisons[compIdx];
  history.push({ compIdx, ratings: {...ratings} });
  eloUpdate(tracks[ia].id,tracks[ib].id); compIdx++; updateDuel();
});
document.getElementById('card-b').addEventListener('click', () => {
  if(compIdx>=comparisons.length) return;
  stopAllPreviews();
  const [ia,ib]=comparisons[compIdx];
  history.push({ compIdx, ratings: {...ratings} });
  eloUpdate(tracks[ib].id,tracks[ia].id); compIdx++; updateDuel();
});
document.getElementById('skip-btn').addEventListener('click', () => {
  if(compIdx>=comparisons.length) return;
  stopAllPreviews();
  const [ia,ib]=comparisons[compIdx];
  history.push({ compIdx, ratings: {...ratings} });
  eloUpdate(tracks[ia].id,tracks[ib].id,true); compIdx++; updateDuel();
});
document.getElementById('undo-btn').addEventListener('click', () => {
  if (!history.length) return;
  stopAllPreviews();
  const prev = history.pop();
  compIdx = prev.compIdx;
  ratings = prev.ratings;
  updateDuel();
});

function showResults() {
  document.getElementById('duel-phase').style.display    = 'none';
  document.getElementById('results-phase').style.display = 'block';
  document.getElementById('results-album-name').textContent =
    currentAlbum.name + ' — ' + currentAlbum.artists.map(a=>a.name).join(', ');

  const sorted = [...tracks].sort((a,b) => ratings[b.id]-ratings[a.id]);
  const list   = document.getElementById('ranking-list');
  list.innerHTML = '';

  sorted.forEach((track, idx) => {
    const rank = idx+1;
    const cls  = rank===1?'rank-num gold':rank===2?'rank-num silver':rank===3?'rank-num bronze':'rank-num';
    const item = document.createElement('div');
    item.className = 'rank-item';
    item.style.animationDelay = (idx*.04)+'s';
    item.innerHTML = `
      <div class="${cls}">${rank}</div>
      <div class="rank-name">${track.name}</div>
      <div class="rank-dur">${fmtDur(track.duration_ms)}</div>`;
    list.appendChild(item);
  });
}

document.getElementById('restart-btn').addEventListener('click', () => {
  initRanking();
  document.getElementById('duel-phase').style.display    = 'block';
  document.getElementById('results-phase').style.display = 'none';
});
document.getElementById('new-album-btn').addEventListener('click', () => {
  document.getElementById('ranking-section').style.display = 'none';
  document.getElementById('search-section').style.display  = 'block';
  document.getElementById('albums-results').innerHTML = '';
  document.getElementById('search-status').innerHTML  = '';
  document.getElementById('artist-input').value = '';
  document.getElementById('link-input').value   = '';
});
document.getElementById('back-btn').addEventListener('click', () => {
  document.getElementById('ranking-section').style.display = 'none';
  document.getElementById('search-section').style.display  = 'block';
});
</script>
</body>
</html>
