<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Debug Preview</title>
<style>
body { font-family: monospace; background:#111; color:#eee; padding:20px; }
input { background:#222; border:1px solid #444; color:#eee; padding:8px; width:260px; border-radius:6px; }
button { background:#1db954; color:#000; border:none; padding:8px 16px; border-radius:6px; cursor:pointer; margin-left:8px; }
.result { margin:10px 0; padding:10px; border-radius:6px; background:#1a1a1a; }
.ok { border-left:3px solid #1db954; }
.fail { border-left:3px solid #ff4444; }
.pending { border-left:3px solid #888; }
audio { display:block; margin-top:8px; width:100%; }
pre { font-size:11px; color:#aaa; white-space:pre-wrap; word-break:break-all; margin-top:6px; }
</style>
</head>
<body>
<h2>🔍 Debug Preview</h2>
<p style="color:#aaa;font-size:13px;">Entrez un Spotify Track ID (depuis open.spotify.com/track/<b>ID</b>)</p>
<div>
  <input id="trackid" placeholder="Spotify Track ID" />
  <button onclick="testAll()">Tester</button>
</div>
<div id="results" style="margin-top:20px;"></div>

<script>
const CLIENT_ID     = '3f3173e083604096abe93d93e05a8867';
const CLIENT_SECRET = '76dff06debf5467aa7fe2dc911779134';
let token = '';

async function getToken() {
  if (token) return token;
  const r = await fetch('https://accounts.spotify.com/api/token', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/x-www-form-urlencoded',
      'Authorization': 'Basic ' + btoa(CLIENT_ID + ':' + CLIENT_SECRET)
    },
    body: 'grant_type=client_credentials'
  });
  const d = await r.json();
  token = d.access_token;
  return token;
}

function log(type, label, msg) {
  const d = document.getElementById('results');
  const div = document.createElement('div');
  div.className = `result ${type}`;
  div.id = `log-${label}`;
  div.innerHTML = `<strong>${label}</strong><br>${msg}`;
  d.appendChild(div);
}
function update(label, type, msg) {
  const el = document.getElementById(`log-${label}`);
  if (el) { el.className = `result ${type}`; el.innerHTML = `<strong>${label}</strong><br>${msg}`; }
}

async function testAll() {
  const trackId = document.getElementById('trackid').value.trim();
  if (!trackId) return alert('Entrez un Spotify Track ID');
  document.getElementById('results').innerHTML = '';

  // 1. Spotify
  log('pending', 'Spotify', 'Chargement...');
  let track, isrc, artistName, trackName;
  try {
    const tok = await getToken();
    const r = await fetch(`https://api.spotify.com/v1/tracks/${trackId}`, {
      headers: { Authorization: 'Bearer ' + tok }
    });
    track = await r.json();
    isrc = track.external_ids?.isrc;
    artistName = track.artists?.[0]?.name || '';
    trackName = track.name;
    update('Spotify', track.preview_url ? 'ok' : 'fail',
      `${track.name} — ${artistName}<br>ISRC: <b>${isrc || 'N/A'}</b><br>Preview Spotify: ${track.preview_url ? `<audio controls src="${track.preview_url}"></audio>` : '❌ Aucun'}`
    );
  } catch(e) {
    update('Spotify', 'fail', `❌ ${e.message}`); return;
  }

  // 2. MusicBrainz par ISRC
  if (isrc) {
    log('pending', 'MusicBrainz', 'Recherche titre canonique...');
    try {
      const r = await fetch(`https://musicbrainz.org/ws/2/isrc/${isrc}?inc=recordings&fmt=json`, {
        headers: { 'User-Agent': 'RankTune/1.0' }
      });
      const d = await r.json();
      const recordings = d.recordings || [];
      if (recordings.length) {
        const titles = recordings.slice(0,5).map(r => r.title).join(', ');
        update('MusicBrainz', 'ok', `✅ ${recordings.length} enregistrement(s)<br>Titres: <b>${titles}</b>`);

        // Tester chaque titre sur iTunes
        for (const rec of recordings.slice(0, 3)) {
          for (const country of ['il', 'us', 'fr']) {
            const label = `iTunes "${rec.title}" (${country.toUpperCase()})`;
            log('pending', label, 'Recherche...');
            try {
              const q = encodeURIComponent(artistName + ' ' + rec.title);
              const ri = await fetch(`https://itunes.apple.com/search?term=${q}&entity=song&limit=10&country=${country}`);
              const di = await ri.json();
              const match = di.results?.find(t => t.previewUrl);
              if (match?.previewUrl) {
                update(label, 'ok', `✅ ${match.trackName} — ${match.artistName}<br><audio controls src="${match.previewUrl}"></audio>`);
              } else {
                update(label, 'fail', `❌ ${di.resultCount} résultats, aucun preview`);
              }
            } catch(e) { update(label, 'fail', `❌ ${e.message}`); }
          }
        }
      } else {
        update('MusicBrainz', 'fail', `❌ ISRC inconnu dans MusicBrainz<br><pre>${JSON.stringify(d).slice(0,200)}</pre>`);
      }
    } catch(e) {
      update('MusicBrainz', 'fail', `❌ ${e.message}`);
    }

    // 3. iTunes lookup ISRC direct
    for (const country of ['il', 'us', 'fr']) {
      const label = `iTunes lookup ISRC (${country.toUpperCase()})`;
      log('pending', label, 'Recherche...');
      try {
        const r = await fetch(`https://itunes.apple.com/lookup?isrc=${isrc}&country=${country}&entity=song`);
        const d = await r.json();
        const match = d.results?.find(t => t.previewUrl && t.kind === 'song');
        if (match?.previewUrl) {
          update(label, 'ok', `✅ ${match.trackName} — ${match.artistName}<br><audio controls src="${match.previewUrl}"></audio>`);
        } else {
          update(label, 'fail', `❌ ${d.resultCount} résultat(s)`);
        }
      } catch(e) { update(label, 'fail', `❌ ${e.message}`); }
    }
  }

  // 4. iTunes recherche par nom dans IL/US/FR
  for (const country of ['il', 'us', 'fr']) {
    const label = `iTunes nom (${country.toUpperCase()})`;
    log('pending', label, 'Recherche...');
    try {
      const q = encodeURIComponent(artistName + ' ' + trackName);
      const r = await fetch(`https://itunes.apple.com/search?term=${q}&entity=song&limit=10&country=${country}`);
      const d = await r.json();
      // Afficher tous les résultats pour voir ce qu'iTunes retourne
      const preview = d.results?.find(t => t.previewUrl);
      if (preview) {
        update(label, 'ok', `✅ ${preview.trackName} — ${preview.artistName}<br><audio controls src="${preview.previewUrl}"></audio>`);
      } else {
        const titles = d.results?.slice(0,3).map(t => t.trackName).join(', ') || 'aucun';
        update(label, 'fail', `❌ ${d.resultCount} résultats: ${titles}`);
      }
    } catch(e) { update(label, 'fail', `❌ ${e.message}`); }
  }
}
</script>
</body>
</html>
